<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بحث عن شهادة طالب</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
  <script src="/pdfjs/build/pdf.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="school-name">مدرسة أسامة بن زيد الاعدادية بنين</div>
    <h1>بحث عن شهادة طالب</h1>
    <p class="subtitle">من فضلك اكتب الرقم الشخصي للطالب</p>

    <input type="text" class="search-box" id="studentId" placeholder="أدخل الرقم الشخصي" inputmode="numeric">

    <button class="btn btn-primary" id="searchBtn" onclick="searchCertificate()">
      عرض الشهادة
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:10px;color:#666;">جاري البحث...</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="pdf-container" id="pdfContainer">
      <div class="action-buttons" id="actionButtons" style="display:none;">
        <button class="btn btn-download" onclick="downloadPdf()">تحميل PDF</button>
        <button class="btn btn-image" onclick="saveAsImage()">حفظ كصورة</button>
      </div>
      <div class="certificate-wrapper" id="certificateWrapper">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>

    <a href="/admin" class="admin-link">admin</a>
    <div style="font-size:11px;color:#aaa;margin-top:5px;text-align:center;">م/ محمد ثروت</div>
  </div>

  <div class="overlay" id="overlay" onclick="closeImage()">
    <img id="fullImage" alt="الشهادة">
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/pdfjs/build/pdf.worker.min.js';

    const searchBox = document.getElementById('studentId');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const pdfContainer = document.getElementById('pdfContainer');
    const pdfCanvas = document.getElementById('pdfCanvas');
    const actionButtons = document.getElementById('actionButtons');
    const certificateWrapper = document.getElementById('certificateWrapper');
    const searchBtn = document.getElementById('searchBtn');
    const overlay = document.getElementById('overlay');
    const fullImage = document.getElementById('fullImage');

    let currentPdfBlob = null;
    let currentPdfUrl = null;

    searchBox.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchCertificate();
    });

    async function searchCertificate() {
      const id = searchBox.value.trim();
      if (!id) {
        showError('من فضلك أدخل الرقم الشخصي');
        return;
      }

      loading.style.display = 'block';
      errorMsg.style.display = 'none';
      pdfContainer.style.display = 'none';
      actionButtons.style.display = 'none';
      searchBtn.disabled = true;

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'لم يتم العثور على الشهادة');
        }

        currentPdfBlob = await res.blob();
        currentPdfUrl = URL.createObjectURL(currentPdfBlob);

        pdfContainer.style.display = 'block';
        actionButtons.style.display = 'flex';
        errorMsg.style.display = 'none';

        renderPdfToCanvas(currentPdfBlob);
      } catch (err) {
        showError(err.message);
      } finally {
        loading.style.display = 'none';
        searchBtn.disabled = false;
      }
    }

    async function renderPdfToCanvas(blob) {
      try {
        const arrayBuffer = await blob.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const page = await pdf.getPage(1);

        const wrapperWidth = certificateWrapper.clientWidth || 700;
        const viewport = page.getViewport({ scale: 1 });
        const scale = Math.min(wrapperWidth / viewport.width, 1.5);
        const scaledViewport = page.getViewport({ scale });

        const canvas = pdfCanvas;
        const ctx = canvas.getContext('2d');
        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;

        await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
      } catch (err) {
        console.error('Render error:', err);
      }
    }

    function downloadPdf() {
      if (!currentPdfUrl) return;
      const a = document.createElement('a');
      a.href = currentPdfUrl;
      a.download = 'شهادة.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function saveAsImage() {
      if (!pdfCanvas.width) return;
      const dataUrl = pdfCanvas.toDataURL('image/png');
      fullImage.src = dataUrl;
      overlay.style.display = 'flex';
    }

    function closeImage() {
      overlay.style.display = 'none';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      pdfContainer.style.display = 'none';
      actionButtons.style.display = 'none';
    }
  </script>
</body>
</html>
