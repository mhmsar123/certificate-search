<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بحث عن شهادة طالب</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="school-name">مدرسة أسامة بن زيد الاعدادية بنين</div>
    <div class="news-banner" id="newsBanner" style="display:none;">
      <div class="banner-icon">📢</div>
      <div class="banner-text-wrap">
        <div class="banner-text" id="bannerTextDisplay"></div>
      </div>
    </div>
    <h1>بحث عن شهادة طالب</h1>
    <p class="subtitle">من فضلك اكتب الرقم الشخصي للطالب</p>

    <input type="text" class="search-box" id="studentId" placeholder="أدخل الرقم الشخصي" inputmode="numeric">

    <div class="total-certificates" id="totalCertificates"></div>

    <button class="btn btn-primary" id="searchBtn" onclick="searchCertificate()">
      عرض الشهادة
    </button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top:10px;color:#666;">جاري البحث...</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="pdf-container" id="pdfContainer">
      <div class="action-buttons" id="actionButtons" style="display:none;">
        <button class="btn btn-download" onclick="downloadPdf()">تحميل PDF</button>
        <button class="btn btn-image" onclick="saveAsImage()">حفظ كصورة</button>
        <button class="btn btn-whatsapp" onclick="shareWhatsApp()">مشاركة واتساب</button>
      </div>
      <div class="certificate-wrapper" id="certificateWrapper">
        <iframe id="pdfFrame" style="width:100%;height:90vh;border:none;display:block;"></iframe>
      </div>
    </div>

    <a href="/admin" class="admin-link">admin</a>
    <div class="visitor-count" id="visitorCount"></div>
    <div style="font-size:11px;color:#aaa;margin-top:5px;text-align:center;">م/ محمد ثروت</div>
  </div>

  <div class="overlay" id="overlay" onclick="closeImage()">
    <img id="fullImage" alt="الشهادة">
  </div>

  <script>
    const searchBox = document.getElementById('studentId');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');
    const pdfContainer = document.getElementById('pdfContainer');
    const actionButtons = document.getElementById('actionButtons');
    const certificateWrapper = document.getElementById('certificateWrapper');
    const searchBtn = document.getElementById('searchBtn');
    const overlay = document.getElementById('overlay');
    const fullImage = document.getElementById('fullImage');

    let currentPdfBlob = null;
    let currentPdfUrl = null;

    searchBox.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') searchCertificate();
    });

    async function searchCertificate() {
      const id = document.getElementById('studentId').value.trim();
      if (!id) { showError('من فضلك أدخل الرقم الشخصي'); return; }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('pdfContainer').style.display = 'none';
      document.getElementById('actionButtons').style.display = 'none';
      document.getElementById('searchBtn').disabled = true;

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'لم يتم العثور على الشهادة');
        }
        const data = await res.json();
        document.getElementById('pdfContainer').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        document.getElementById('errorMsg').style.display = 'none';
        const frame = document.getElementById('pdfFrame');
        frame.src = '/api/certificate-page/' + data.admin + '/' + data.pages[0] + '#view=FitH';
        frame.dataset.admin = data.admin;
        frame.dataset.page = data.pages[0];
      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('searchBtn').disabled = false;
      }
    }

    function downloadPdf() {
      const frame = document.getElementById('pdfFrame');
      if (!frame.dataset.admin || !frame.dataset.page) return;
      window.open('/api/certificate-page/' + frame.dataset.admin + '/' + frame.dataset.page, '_blank');
    }

    function saveAsImage() {
      const frame = document.getElementById('pdfFrame');
      if (!frame.dataset.admin || !frame.dataset.page) return;
      window.open('/api/certificate-page/' + frame.dataset.admin + '/' + frame.dataset.page, '_blank');
    }

    function shareWhatsApp() {
      const id = document.getElementById('studentId').value.trim();
      const url = window.location.origin + '/api/certificate-page/' + document.getElementById('pdfFrame').dataset.admin + '/' + document.getElementById('pdfFrame').dataset.page;
      const text = encodeURIComponent(`شهادة طالب - الرقم الشخصي: ${id}\n\n${url}`);
      window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('pdfContainer').style.display = 'none';
      document.getElementById('actionButtons').style.display = 'none';
    }

    async function loadBanner() {
      try {
        const res = await fetch('/api/banner');
        const data = await res.json();
        const banner = document.getElementById('newsBanner');
        const text = document.getElementById('bannerTextDisplay');
        text.textContent = data.text;
        banner.style.display = 'flex';
      } catch (e) {}
    }

    async function loadVisitors() {
      try {
        const res = await fetch('/api/visitors');
        const data = await res.json();
        document.getElementById('visitorCount').textContent = `عدد الزوار: ${data.count.toLocaleString('ar-SA')}`;
      } catch (e) {}
    }

    async function loadTotalCertificates() {
      try {
        const res = await fetch('/api/total-certificates');
        const data = await res.json();
        if (data.total > 0) {
          document.getElementById('totalCertificates').textContent = `إجمالي الشهادات: ${data.total.toLocaleString('ar-SA')}`;
        }
      } catch (e) {}
    }

    loadBanner();
    loadVisitors();
    loadTotalCertificates();
  </script>
</body>
</html>
